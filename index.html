<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ah.info - Проверка документа</title>
  <link href="./bootstrap.min.css" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    .topbar {
      background: #ffffff;
      border-bottom: 1px solid #e3e6ea;
    }

    .topbar .inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 32px;
      font-weight: 700;
      color: #1d4f91;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #2c5d99;
      font-size: 15px;
      font-weight: 600;
    }

    .main {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .wrapper {
      background: #fff;
      border: 1px solid #e2e6ea;
      padding: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .info-box {
      background: #faf6e8;
      border: 1px solid #eadca8;
      color: #7a6522;
      padding: 16px 18px;
      margin-bottom: 28px;
      font-size: 15px;
      line-height: 1.6;
    }

    .info-box a {
      color: #2b69b1;
      text-decoration: none;
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #222;
    }

    .pin-form {
      max-width: 340px;
      border: 1px solid #dfe3e8;
      padding: 22px;
      background: #fff;
    }

    .pin-form label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #333;
    }

    .pin-form input {
      width: 100%;
      height: 48px;
      border: 1px solid #cfd6dd;
      padding: 0 14px;
      font-size: 18px;
      margin-bottom: 16px;
      outline: none;
    }

    .pin-form input:focus {
      border-color: #7aa7d9;
    }

    .pin-form button {
      width: 100%;
      height: 48px;
      border: none;
      background: #46a548;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .pin-form button:hover {
      background: #3d9440;
    }

    .status-text {
      margin-top: 12px;
      min-height: 20px;
      font-size: 14px;
    }

    .status-text.error {
      color: #c62828;
    }

    .status-text.success {
      color: #2e7d32;
    }

    .bottom-text {
      margin-top: 26px;
      font-size: 15px;
      color: #2f6fae;
    }

    .preview {
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      border: 1px solid #dfe3e8;
      background: #fff;
      padding: 10px;
    }

    .footer {
      text-align: center;
      color: #666;
      font-size: 14px;
      padding: 18px 10px 24px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .wrapper {
        padding: 24px;
      }

      .title {
        font-size: 24px;
      }

      .pin-form {
        max-width: 100%;
      }
    }

    @media (max-width: 600px) {
      .topbar .inner {
        padding: 14px 16px;
      }

      .brand {
        font-size: 26px;
      }

      .nav-links {
        gap: 12px;
      }

      .nav-links a {
        font-size: 14px;
      }

      .main {
        margin: 20px auto;
        padding: 0 12px;
      }

      .wrapper {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="inner">
      <a href="#" class="brand">ah.info</a>

    </div>
  </header>

  <main class="main">
    <div class="wrapper">
      <div class="grid">

        <div>
          <div class="info-box">
            Пожалуйста, пройдите авторизацию, чтобы система определила вас.
            Если документ принадлежит вам, PIN-код может не потребоваться.
            <a href="#">Авторизация</a>
          </div>

          <div class="title">Введите PIN-код для просмотра документа</div>

          <form id="pinForm" class="pin-form">
            <label for="repopinmodel-pin_code">ПИН код</label>
            <input
              type="text"
              id="repopinmodel-pin_code"
              name="pin_code"
              autocomplete="off"
              required
              placeholder="Введите PIN-код"
            />

            <button type="submit" id="openBtn">Открыть</button>
            <div id="statusText" class="status-text"></div>
          </form>

          <div class="bottom-text">
            PIN-код размещается рядом с QR-кодом документа
          </div>
        </div>

        <div class="preview">
          <img src="./image (72).png" alt="Документ">
        </div>

      </div>
    </div>
  </main>

  <div class="footer">
    © ah.info 2026
  </div>

  <script>
    const form = document.getElementById("pinForm");
    const input = document.getElementById("repopinmodel-pin_code");
    const statusText = document.getElementById("statusText");
    const openBtn = document.getElementById("openBtn");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const pin = input.value.trim();

      statusText.textContent = "";
      statusText.className = "status-text";

      if (!pin) {
        statusText.textContent = "Введите PIN-код.";
        statusText.classList.add("error");
        return;
      }

      openBtn.disabled = true;
      openBtn.textContent = "Проверка...";

      const pdfPath = `./${pin}.pdf`;

      fetch(pdfPath, { method: "HEAD" })
        .then((response) => {
          if (response.ok) {
            statusText.textContent = "Документ найден. Загрузка...";
            statusText.classList.add("success");

            const a = document.createElement("a");
            a.href = pdfPath;
            a.download = `${pin}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          } else {
            statusText.textContent = "Документ не найден.";
            statusText.classList.add("error");
          }
        })
        .catch(() => {
          statusText.textContent = "Ошибка при проверке документа.";
          statusText.classList.add("error");
        })
        .finally(() => {
          openBtn.disabled = false;
          openBtn.textContent = "Открыть";
        });
    });
  </script>

</body>
</html>
